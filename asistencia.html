<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Asistencia</title>
  <meta name="description" content="Control de asistencia universitaria por ramos, horarios y clases.">
  <meta name="theme-color" content="#0f1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <script defer src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg:      #0f1117;
      --sur:     #181b27;
      --sur2:    #20243a;
      --sur3:    #262c42;
      --border:  #2b3050;
      --text:    #e2e8f0;
      --muted:   #97a5ba;
      --accent:  #5b6af5;
      --green:   #22c55e;
      --yellow:  #f59e0b;
      --red:     #ef4444;
      --focus-ring: #8b97ff;
      --focus-halo: rgba(91,106,245,.34);
      --toast-bg: rgba(24,27,39,.76);
      --toast-border: rgba(151,165,186,.28);
      --toast-shadow: rgba(0,0,0,.38);
      --r:       10px;
      --rsm:     6px;
      --tr:      0.16s ease;
    }
    :root[data-theme='light'] {
      --bg:      #f3f5fb;
      --sur:     #ffffff;
      --sur2:    #e9edf8;
      --sur3:    #dde4f5;
      --border:  #c7d3ea;
      --text:    #101828;
      --muted:   #4b5b73;
      --accent:  #4558e6;
      --green:   #15803d;
      --yellow:  #b45309;
      --red:     #dc2626;
      --focus-ring: #3f4dd6;
      --focus-halo: rgba(69,88,230,.26);
      --toast-bg: rgba(255,255,255,.74);
      --toast-border: rgba(148,163,184,.42);
      --toast-shadow: rgba(15,23,42,.18);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
         background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
    #app{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}

    /* ── HEADER ── */
    .hdr{background:var(--sur);border-bottom:1px solid var(--border);
         padding:0 20px;min-height:56px;display:flex;align-items:center;
         justify-content:space-between;gap:10px;position:sticky;top:0;z-index:200}
    .hdr-title{font-size:16px;font-weight:700}
    .hdr-title span{color:var(--accent)}
    .hdr-right{display:flex;gap:10px;align-items:center;min-width:0}
    .hdr-actions{display:flex;gap:6px;align-items:center}
    .btn-ico,.tab-ico,.ico-inline{display:inline-flex;align-items:center;justify-content:center;line-height:0;flex-shrink:0}
    .btn-ico svg,.tab-ico svg,.ico-inline svg{width:15px;height:15px;stroke-width:2}
    .tab-ico{margin-right:1px}
    .btn-label{line-height:1}
    svg.lucide{display:block}

    /* ── BUTTONS ── */
    .btn{padding:7px 13px;border-radius:var(--rsm);border:1px solid transparent;
         cursor:pointer;font-size:13px;font-weight:500;transition:var(--tr);
         display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
    .btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn-p:hover{background:#4a59e0}
    .btn-s{background:var(--sur2);color:var(--text);border-color:var(--border)}
    .btn-s:hover{background:var(--sur3)}
    .btn-d{background:transparent;color:var(--red);border-color:var(--red)}
    .btn-d:hover{background:var(--red);color:#fff}
    .btn-g{background:transparent;color:var(--muted);border:none;padding:6px 8px}
    .btn-g:hover{color:var(--text)}
    .ibtn{width:28px;height:28px;background:transparent;border:none;border-radius:var(--rsm);
          color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
          font-size:13px;transition:var(--tr)}
    .ibtn:hover{background:var(--sur2);color:var(--text)}

    :where(button,a,.btn,.tab,.ibtn,.btn-det,.mbtn,.offbtn,.sched-add,.rmbtn,.mclose,.back-btn):focus-visible{
      outline:2px solid var(--focus-ring);
      outline-offset:2px;
      box-shadow:0 0 0 3px var(--focus-halo);
    }

    /* ── VIEW TABS ── */
    .tabs{display:flex;gap:4px;min-width:0}
    .tab{padding:5px 12px;border-radius:var(--rsm);border:1px solid var(--border);
      background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:500;
      display:inline-flex;align-items:center;justify-content:center;gap:6px}
    .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

    /* ══════════════════════════════════
       CALENDAR VIEW
    ══════════════════════════════════ */
    #main{display:flex;flex-direction:column;flex-shrink:0}

    .cal-nav{display:flex;align-items:center;gap:8px;padding:10px 16px;
             background:var(--sur);border-bottom:1px solid var(--border);flex-shrink:0}
    .cal-range{font-size:13px;font-weight:600;flex:1;text-align:center}

    /* overflow-x:auto para scroll horizontal del grid; overflow-y:clip NO crea
       scroll container (≠ hidden), así el scroll vertical sube a la página */
    .cal-outer{overflow-x:auto;overflow-y:clip;position:relative}

    /* sticky grid container */
    .cal-grid{display:grid;grid-template-columns:52px repeat(6,minmax(130px,1fr));
              min-width:830px}

    /* corner */
    .cal-corner{background:var(--sur);border-bottom:1px solid var(--border);
                border-right:1px solid var(--border);position:sticky;top:56px;left:0;z-index:30}

    /* day headers */
    .cal-dh{background:var(--sur);border-bottom:1px solid var(--border);
            border-right:1px solid var(--border);padding:8px 6px;
            text-align:center;position:sticky;top:56px;z-index:20}
    .cal-dh.today-col{background:rgba(91,106,245,.12)}
    .cal-dh-name{font-size:12px;font-weight:700;text-transform:uppercase;
                 letter-spacing:.5px;color:var(--muted)}
    .cal-dh-date{font-size:15px;font-weight:700;margin-top:2px}
    .cal-dh-date.today-num{color:var(--accent)}
    .cal-dh.today-col .cal-dh-name{color:var(--accent)}

    /* time label cells */
    .time-cell{background:var(--bg);border-right:1px solid var(--border);
               border-bottom:1px solid rgba(43,48,80,.4);height:60px;
               position:relative;position:sticky;left:0;z-index:10}
    .time-cell span{position:absolute;bottom:-8px;right:6px;
                    font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums}

    /* day cells */
    .day-cell{border-right:1px solid var(--border);
              border-bottom:1px solid rgba(43,48,80,.4);
              height:60px;position:relative}
    .day-cell.today-col{background:rgba(91,106,245,.03)}
    .day-cell.half-hour::after{content:'';position:absolute;left:0;right:0;
                               top:50%;border-top:1px dashed rgba(43,48,80,.4)}
    .day-cell.out-sem{background:repeating-linear-gradient(
      -45deg,transparent,transparent 6px,rgba(0,0,0,.12) 6px,rgba(0,0,0,.12) 7px)}

    /* class blocks — span multiple rows via JS by setting style */
    .cls-block{position:absolute;left:3px;right:3px;border-radius:5px;
           border-left:3px solid;padding:4px 6px;cursor:pointer;
           overflow:hidden;transition:var(--tr);z-index:5;
           touch-action:manipulation}
    .cls-block:hover{filter:brightness(1.25);z-index:15}
    .cls-cancelled{opacity:.35}
    .cls-markable .cls-bname,.cls-markable .cls-btype{padding-right:42px}
    .cls-actions{position:absolute;top:4px;right:4px;display:none;gap:4px;z-index:2}
    .cls-act{width:18px;height:18px;border:none;border-radius:999px;
         font-size:11px;font-weight:800;line-height:1;cursor:pointer;
         display:flex;align-items:center;justify-content:center;
         background:rgba(15,17,23,.58);color:#fff;transition:var(--tr)}
    .cls-act-ok:hover,.cls-act-ok.on{background:var(--green)}
    .cls-act-bad:hover,.cls-act-bad.on{background:var(--red)}
    .cls-bname{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;
               text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
    .cls-btype{font-size:9px;color:rgba(255,255,255,.55);margin-top:1px}
    .sico{font-size:9px;font-weight:900;flex-shrink:0}
    .sico-ok  {color:var(--green)}
    .sico-bad {color:var(--red)}
    .sico-warn{color:var(--yellow)}

    /* today time line */
    .now-line{position:absolute;left:0;right:0;height:2px;background:var(--red);
              z-index:12;pointer-events:none;box-shadow:0 0 10px rgba(239,68,68,.55)}
    .now-dot{position:absolute;left:0;top:0;width:10px;height:10px;
             transform:translate(-50%,-40%);border-radius:50%;background:var(--red);
             box-shadow:0 0 0 2px rgba(239,68,68,.24),0 0 12px rgba(239,68,68,.75);
             animation:now-pulse 1.8s ease-out infinite}
    @keyframes now-pulse{
      0%{transform:translate(-50%,-40%) scale(1);box-shadow:0 0 0 2px rgba(239,68,68,.24),0 0 10px rgba(239,68,68,.68)}
      70%{transform:translate(-50%,-40%) scale(1.35);box-shadow:0 0 0 8px rgba(239,68,68,0),0 0 16px rgba(239,68,68,.92)}
      100%{transform:translate(-50%,-40%) scale(1);box-shadow:0 0 0 2px rgba(239,68,68,.12),0 0 10px rgba(239,68,68,.68)}
    }

    /* ══════════════════════════════════
       LIST VIEW (cards)
    ══════════════════════════════════ */
    .list-wrap{padding:20px}
    .list-top{display:grid;grid-template-columns:minmax(0,1fr);gap:12px;margin-bottom:14px}
    .list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;align-items:start}
    .global-card{background:linear-gradient(140deg,rgba(91,106,245,.16),rgba(34,197,94,.1));
           border:1px solid var(--border);border-radius:var(--r);padding:13px 15px}
    .global-card-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
    .global-card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
    .global-card-lines{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
    .global-line{display:flex;align-items:baseline;justify-content:space-between;gap:10px;
           background:var(--sur);border:1px solid var(--border);border-radius:var(--rsm);padding:8px 10px}
    .global-line span{font-size:12px;color:var(--muted)}
    .global-line strong{font-size:16px;line-height:1}
    .global-line strong.ok{color:var(--green)}
    .global-line strong.warning{color:var(--yellow)}
    .global-line strong.danger{color:var(--red)}
    .global-line strong.unknown{color:var(--muted)}
    .global-note{margin-top:8px;font-size:11px;color:var(--muted)}

    /* ── GROUP LABEL ── */
    .group-wrap{display:flex;flex-direction:column;gap:5px}
    .group-cards{display:flex;align-items:stretch}
    .group-cards>.card{flex:1;border-radius:0;border-right:none;min-width:0}
    .group-cards>.card:first-child{border-top-left-radius:var(--r);border-bottom-left-radius:var(--r)}
    .group-cards>.card:last-child{border-top-right-radius:var(--r);border-bottom-right-radius:var(--r);border-right:1px solid var(--border)}
    .group-cards>.card:only-child{border-radius:var(--r);border-right:1px solid var(--border)}
    .glabel{display:flex;align-items:center;gap:8px;padding:0 2px}
    .glabel-name{font-size:10px;font-weight:700;color:var(--muted);
                 text-transform:uppercase;letter-spacing:.6px}
    .gstatus{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
    .gstatus.ok     {background:rgba(34,197,94,.15);color:var(--green)}
    .gstatus.danger {background:rgba(239,68,68,.15);color:var(--red)}
    .gstatus.warning{background:rgba(245,158,11,.15);color:var(--yellow)}
    .gstatus.unknown{background:var(--sur2);color:var(--muted)}
    .glabel-sep{flex:1;height:1px}

    .card{background:var(--sur);border:1px solid var(--border);
          border-left:4px solid var(--cc,var(--accent));border-radius:var(--r);padding:16px 18px}
    .card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .card-name{display:flex;align-items:center;gap:7px}
    .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .badge{background:var(--sur2);color:var(--muted);padding:2px 6px;border-radius:20px;
           font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
    .pct-row{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
    .pct-big{font-size:34px;font-weight:800;line-height:1}
    .pct-big.ok{color:var(--green)} .pct-big.warning{color:var(--yellow)}
    .pct-big.danger{color:var(--red)} .pct-big.unknown{color:var(--muted)}
    .pct-min{color:var(--muted);font-size:13px}
    .bar{height:5px;background:var(--sur2);border-radius:3px;margin-bottom:9px;position:relative}
    .bar-fill{height:100%;border-radius:3px;transition:width .4s}
    .bar-fill.ok{background:var(--green)}.bar-fill.warning{background:var(--yellow)}
    .bar-fill.danger{background:var(--red)}.bar-fill.unknown{background:var(--muted)}
    .bar-mark{position:absolute;top:-5px;width:2px;height:15px;
              background:rgba(255,255,255,.5);border-radius:1px;transform:translateX(-50%)}
    .card-meta{display:flex;justify-content:space-between;align-items:center;
               color:var(--muted);font-size:12px;margin-bottom:5px}
    .twarn{background:rgba(245,158,11,.12);color:var(--yellow);padding:2px 6px;
           border-radius:20px;font-size:11px}
    .miss-line{font-size:12px;margin-bottom:11px}
    .miss-line.ok{color:var(--green)}.miss-line.danger{color:var(--red)}
    .miss-line.muted{color:var(--muted)}
    .btn-det{width:100%;padding:8px;background:var(--sur2);border:1px solid var(--border);
             border-radius:var(--rsm);color:var(--text);font-size:12px;cursor:pointer;transition:var(--tr)}
    .btn-det:hover{background:var(--sur3)}

    /* ══════════════════════════════════
       DETAIL VIEW
    ══════════════════════════════════ */
    .detail-wrap{padding:20px}
    .detail-inner{max-width:680px;margin:0 auto}
    .det-head{display:flex;align-items:center;gap:12px;margin-bottom:20px}
    .back-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px}
    .back-btn:hover{text-decoration:underline}
    .det-title{display:flex;align-items:center;gap:9px}
    .det-title h2{font-size:20px;font-weight:700}
    .stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
               gap:9px;margin-bottom:16px}
    .stat{background:var(--sur);border:1px solid var(--border);border-radius:var(--r);
          padding:13px;text-align:center}
    .stat.swarn{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.04)}
    .stat-v{font-size:24px;font-weight:800;margin-bottom:3px}
    .stat-v.ok{color:var(--green)}.stat-v.warning{color:var(--yellow)}
    .stat-v.danger{color:var(--red)}
    .stat-l{font-size:11px;color:var(--muted)}
    .det-overview{background:var(--sur);border:1px solid var(--border);border-radius:var(--r);
            padding:12px;margin-bottom:18px;display:flex;flex-direction:column;gap:10px}
    .det-overview-meta{display:flex;flex-direction:column;gap:8px}
    .info-bar{padding:9px 13px;background:var(--sur);border:1px solid var(--border);
              border-radius:var(--rsm);font-size:13px;color:var(--muted);margin-bottom:14px}
    .info-bar strong{color:var(--text)}
    .det-overview .info-bar{margin-bottom:0;background:var(--sur2)}
    .det-acts{display:flex;gap:7px;flex-wrap:wrap}
    .hist-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
          letter-spacing:.8px;margin-bottom:10px;padding:0 2px}

    /* class list */
    .mgroup{margin-bottom:16px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .mlbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
          letter-spacing:1px;padding:7px 13px;background:var(--sur2);border-bottom:1px solid var(--border)}
    .crow{display:flex;justify-content:space-between;align-items:center;
          padding:9px 13px;border-radius:0;
          background:var(--sur);border:none;border-bottom:1px solid var(--border)}
    .crow:last-child{border-bottom:none}
    .crow.att{border-bottom-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04)}
    .crow.abs{border-bottom-color:rgba(239,68,68,.3);background:rgba(239,68,68,.04)}
    .crow.off{opacity:.45}
    .cdate{font-size:13px;font-weight:500}
    .cacts{display:flex;align-items:center;gap:5px}
    .mbtn{padding:4px 9px;border-radius:var(--rsm);border:1px solid var(--border);
          background:var(--sur2);color:var(--muted);cursor:pointer;font-size:12px;transition:var(--tr)}
    .mbtn:hover:not(.ma){border-color:var(--muted);color:var(--text)}
    .mbtn.ok.ma{background:var(--green);border-color:var(--green);color:#fff}
    .mbtn.bad.ma{background:var(--red);border-color:var(--red);color:#fff}
    .offbtn{padding:4px 7px;border-radius:var(--rsm);border:1px solid transparent;
            background:transparent;color:var(--muted);cursor:pointer;font-size:12px;transition:var(--tr)}
    .offbtn:hover{border-color:var(--red);color:var(--red)}
    .offbtn.reac{border-color:rgba(34,197,94,.4);color:var(--green)}
    .offbtn.reac:hover{background:rgba(34,197,94,.08)}
    .clbl{font-size:12px;color:var(--muted);padding:4px 7px}

        /* toast/snackbar */
        .toast-wrap{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);
          width:min(92vw,420px);display:flex;flex-direction:column;gap:8px;
          z-index:2200;pointer-events:none}
        .toast{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--toast-bg);
          border:1px solid var(--toast-border);border-radius:var(--r);color:var(--text);
          box-shadow:0 12px 30px var(--toast-shadow);
          backdrop-filter:blur(10px) saturate(130%);
          -webkit-backdrop-filter:blur(10px) saturate(130%);
          opacity:0;transform:translateY(10px) scale(.98);
          transition:opacity .2s ease,transform .2s ease}
        .toast.show{opacity:1;transform:translateY(0) scale(1)}
        .toast-ico{display:inline-flex;align-items:center;justify-content:center;line-height:0}
        .toast-ico svg{width:16px;height:16px;stroke-width:2.2}
        .toast-msg{font-size:13px;font-weight:500}
        .toast.t-ok{border-color:rgba(34,197,94,.45)}
        .toast.t-ok .toast-ico{color:var(--green)}
        .toast.t-warn{border-color:rgba(245,158,11,.45)}
        .toast.t-warn .toast-ico{color:var(--yellow)}
        .toast.t-error{border-color:rgba(239,68,68,.45)}
        .toast.t-error .toast-ico{color:var(--red)}
        .toast.t-info{border-color:rgba(91,106,245,.45)}
        .toast.t-info .toast-ico{color:var(--accent)}
        @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
          .toast{background:var(--sur)}
        }

    /* ══════════════════════════════════
       MODALS
    ══════════════════════════════════ */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;
             display:flex;align-items:center;justify-content:center;padding:16px}
    .modal{background:var(--sur);border:1px solid var(--border);border-radius:14px;
          width:100%;max-width:500px;max-height:94vh;overflow-y:auto;
          transition:transform .18s ease,opacity .18s ease}
    .mhd{padding:16px 20px 13px;border-bottom:1px solid var(--border);
         display:flex;justify-content:space-between;align-items:center}
    .mhd h3{font-size:15px;font-weight:600}
    .mclose{background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px;
            width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:4px}
    .mclose:hover{background:var(--sur2);color:var(--text)}
    .mbody{padding:16px 20px}
    .mfoot{padding:12px 20px 16px;border-top:1px solid var(--border);
           display:flex;justify-content:flex-end;gap:7px}

    /* forms */
    .fg{margin-bottom:14px}
    .fl{display:block;font-size:11px;font-weight:700;color:var(--muted);
        margin-bottom:5px;letter-spacing:.3px}
    .fi,.fsel{width:100%;padding:8px 10px;background:var(--sur2);
              border:1px solid var(--border);border-radius:var(--rsm);
              color:var(--text);font-size:13px}
    .fi:focus,.fsel:focus{outline:none;border-color:var(--accent)}
    .fsel option{background:var(--sur2)}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
    .fhint{font-size:11px;color:var(--muted);margin-top:3px}
    .fwarn{display:flex;align-items:flex-start;gap:6px;margin-top:8px;padding:8px 9px;
           border:1px solid rgba(245,158,11,.45);border-radius:var(--rsm);

    .mob-cls-item.mob-cls-att{background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.28)}
    .mob-cls-item.mob-cls-abs{background:rgba(239,68,68,.05);border-color:rgba(239,68,68,.28)}

    .mob-cls-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .mob-cls-info{min-width:0;flex:1}

    /* Bottom sheet modals on mobile */

        <button class="btn btn-p" onclick="openSubjModal(null)"><span class="btn-ico" aria-hidden="true"><i data-lucide="plus"></i></span><span class="btn-label">Ramo</span></button>

<div id="mc"></div>
<div id="tc" class="toast-wrap" aria-live="polite" aria-atomic="true"></div>
<input id="impf" type="file" accept=".json,application/json" style="display:none" onchange="onImportFile(event)">

<script>
// ════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════
const KEY     = 'asistencia_v5';
const KEY_OLD = 'asistencia_v4';
const HOUR_PX = 60;
const DAYS_S   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DAYS_F   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MONTHS   = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                  'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_S = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const COLORS   = ['#5b6af5','#22c55e','#f59e0b','#ef4444','#3b82f6',
                  '#ec4899','#14b8a6','#f97316','#a855f7','#84cc16'];
const NO_SEM_END_LOOKAHEAD_DAYS = 30;
const MOBILE_LONG_PRESS_MS = 420;
const YEAR_GUARD_DAYS = 366;
const SUBJECT_TYPES = ['Teoría','Taller','Laboratorio'];
const SUBJECT_TYPE_OTHER = 'Otro';

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let S = loadState();

function getDefaultTheme(){
  return window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function normalizeTheme(t){
  return t === 'light' ? 'light' : 'dark';
}

function makeInitialState() {
  const now = new Date();
  return {
    semStart: `${now.getFullYear()}-${pad(now.getMonth()+1)}-01`,
    semEnd: '',
    subjects: [],
    attendance: {},   // "subId_YYYY-MM-DD_HHMM" -> true|false
    offClasses: {},   // "subId_YYYY-MM-DD_HHMM" -> true
    offDays: [],      // ["YYYY-MM-DD"]
    theme: getDefaultTheme()
  };
}

function withStateDefaults(raw){
  const base = makeInitialState();
  const next = {...base, ...(raw||{})};
  next.subjects = Array.isArray(next.subjects) ? next.subjects : [];
  next.attendance = next.attendance && typeof next.attendance === 'object' ? next.attendance : {};
  next.offClasses = next.offClasses && typeof next.offClasses === 'object' ? next.offClasses : {};
  next.offDays = Array.isArray(next.offDays) ? next.offDays : [];
  next.theme = normalizeTheme(next.theme || getDefaultTheme());
  return next;
}

function loadState() {
  try {
    const r5 = localStorage.getItem(KEY);
    if (r5) return withStateDefaults(JSON.parse(r5));
    const r4 = localStorage.getItem(KEY_OLD);
    if (r4) return withStateDefaults(migrateOld(JSON.parse(r4)));
  } catch(e){}
  return makeInitialState();
}

// Migrates data from v4 (one slot/day, key=subId_date) to v5 (multi-slot, key=subId_date_HHMM)
function migrateOld(d) {
  for (const sub of (d.subjects||[])) {
    if (sub.schedule?.length && typeof sub.schedule[0]==='number')
      sub.schedule = sub.schedule.map(dy=>({day:dy,start:'08:00',end:'09:30'}));
    if (sub.minAttendance && !sub.minAtt) sub.minAtt = sub.minAttendance;
  }
  function migrateKeys(obj) {
    const out={};
    for (const [k,v] of Object.entries(obj||{})) {
      const parts=k.split('_');
      if(parts.length===3){ out[k]=v; continue; } // already new format
      // old: subId_YYYY-MM-DD  (parts[0]=subId, parts[1]=YYYY-MM-DD)
      const [subId,date]=parts;
      const sub=(d.subjects||[]).find(s=>s.id===subId);
      if(!sub) continue;
      const dow=parseD(date).getDay();
      const slots=(sub.schedule||[]).filter(sl=>sl.day===dow);
      if(slots.length===1) out[`${subId}_${date}_${slots[0].start.replace(':','')}`]=v;
      // if multiple slots we can't know which – discard
    }
    return out;
  }
  d.attendance = migrateKeys(d.attendance);
  d.offClasses = migrateKeys(d.offClasses);
  return d;
}

function saveState() { localStorage.setItem(KEY, JSON.stringify(S)); render(); }

// Per-render memoization cache — reset at the top of every render() call.
// Keyed by subject id. No manual invalidation needed: cache is wiped on every render.
let _rc = { gc: null, cs: null };

// key for a specific class instance
function classKey(subId,date,slot){ return `${subId}_${date}_${slot.start.replace(':','')}`; }

function icon(name, cls='ico-inline') {
  return `<i data-lucide="${name}" class="${cls}" aria-hidden="true"></i>`;
}

function refreshIcons() {
  if (window.lucide?.createIcons) window.lucide.createIcons();
}

function toast(message, type='ok') {
  const host = document.getElementById('tc');
  if (!host || !message) return;
  const iconByType = {
    ok: 'check',
    warn: 'triangle-alert',
    error: 'circle-x',
    info: 'info'
  };
  const safeType = iconByType[type] ? type : 'ok';
  const item = document.createElement('div');
  item.className = `toast t-${safeType}`;
  item.innerHTML = `<span class="toast-ico">${icon(iconByType[safeType])}</span><span class="toast-msg">${esc(message)}</span>`;
  host.appendChild(item);
  refreshIcons();
  requestAnimationFrame(() => item.classList.add('show'));
  setTimeout(() => {
    item.classList.remove('show');
    setTimeout(() => item.remove(), 220);
  }, 3000);
}

function isIsoDate(v){
  return typeof v === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(v);
}

function isValidTime(v){
  return typeof v === 'string' && /^([01]\d|2[0-3]):[0-5]\d$/.test(v);
}

function clampNum(n, min, max, fallback){
  const num = Number(n);
  if (Number.isNaN(num)) return fallback;
  return Math.min(max, Math.max(min, Math.round(num)));
}

function normalizeColor(value, fallback=COLORS[0]){
  const v = String(value||'').trim();
  return /^#([0-9a-fA-F]{6})$/.test(v) ? v.toLowerCase() : fallback;
}

function applyTheme(theme){
  const t = normalizeTheme(theme);
  document.documentElement.setAttribute('data-theme', t);
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', t === 'light' ? '#f3f5fb' : '#0f1117');
  S.theme = t;
}

function normalizeImportedState(payload){
  const source = payload && typeof payload === 'object' && payload.state && typeof payload.state === 'object'
    ? payload.state
    : payload;
  if (!source || typeof source !== 'object') return null;
  const hasKnownKeys = ['subjects','attendance','offClasses','offDays','semStart','semEnd','theme']
    .some(k => Object.prototype.hasOwnProperty.call(source, k));
  if (!hasKnownKeys) return null;

  let data = JSON.parse(JSON.stringify(source));
  const needsMigration = Array.isArray(data.subjects) && data.subjects.some(sub =>
    (Array.isArray(sub?.schedule) && typeof sub.schedule[0] === 'number') ||
    (sub?.minAttendance && !sub?.minAtt)
  );
  if (needsMigration) data = migrateOld(data);

  const shaped = withStateDefaults(data);
  const subjects = [];

  for (const rawSub of shaped.subjects) {
    if (!rawSub || typeof rawSub !== 'object') continue;
    const schedule = (Array.isArray(rawSub.schedule) ? rawSub.schedule : [])
      .map(sl => ({day: Number(sl.day), start: String(sl.start||''), end: String(sl.end||'')}))
      .filter(sl => Number.isInteger(sl.day) && sl.day >= 0 && sl.day <= 6 && isValidTime(sl.start) && isValidTime(sl.end) && tMin(sl.end) > tMin(sl.start));
    if (!schedule.length) continue;

    const name = String(rawSub.name || '').trim();
    subjects.push({
      id: String(rawSub.id || uid()),
      name: name || 'Ramo',
      type: String(rawSub.type || 'Teoría'),
      minAtt: clampNum(rawSub.minAtt, 0, 100, 75),
      color: normalizeColor(rawSub.color),
      schedule,
      group: String(rawSub.group || '').trim()
    });
  }

  const state = {
    semStart: isIsoDate(shaped.semStart) ? shaped.semStart : makeInitialState().semStart,
    semEnd: isIsoDate(shaped.semEnd) ? shaped.semEnd : '',
    subjects,
    attendance: {},
    offClasses: {},
    offDays: Array.from(new Set((Array.isArray(shaped.offDays) ? shaped.offDays : []).filter(isIsoDate))),
    theme: normalizeTheme(shaped.theme)
  };

  for (const [k, v] of Object.entries(shaped.attendance || {})) {
    if (v === true || v === false) state.attendance[String(k)] = v;
  }
  for (const [k, v] of Object.entries(shaped.offClasses || {})) {
    if (v === true) state.offClasses[String(k)] = true;
  }
  return state;
}

function exportData(){
  const now = new Date();
  const stamp = `${toStr(now).replace(/-/g,'')}-${pad(now.getHours())}${pad(now.getMinutes())}`;
  const payload = {
    app: 'control-asistencia',
    version: KEY,
    exportedAt: now.toISOString(),
    state: S
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `asistencia-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  toast('Datos exportados en JSON', 'ok');
}

function triggerImport(){
  const inp = document.getElementById('impf');
  if (!inp) return;
  inp.value = '';
  inp.click();
}

async function onImportFile(ev){
  const file = ev?.target?.files?.[0];
  if (!file) return;
  try {
    const raw = JSON.parse(await file.text());
    const imported = normalizeImportedState(raw);
    if (!imported) throw new Error('invalid-import');
    if (!confirm('Esto reemplazará todos los datos actuales. ¿Deseas continuar?')) return;
    S = imported;
    applyTheme(S.theme);
    closeM();
    saveState();
    toast('Datos importados correctamente', 'ok');
  } catch (err) {
    alert('No se pudo importar el archivo. Verifica que sea un respaldo JSON válido.');
    toast('Error al importar datos', 'error');
  } finally {
    if (ev?.target) ev.target.value = '';
  }
}

function uid()   { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function pad(n)  { return String(n).padStart(2,'0'); }
function toStr(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function parseD(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }

function fmtDate(s) {
  const d=parseD(s);
  return `${DAYS_S[d.getDay()]} ${d.getDate()} ${MONTHS_S[d.getMonth()]}`;
}
function fmtDateLong(s) {
  const d=parseD(s);
  return `${DAYS_F[d.getDay()]} ${d.getDate()} de ${MONTHS[d.getMonth()]}`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                       .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function tMin(t)  { const[h,m]=t.split(':').map(Number); return h*60+m; }
function tStr(m)  { return `${pad(Math.floor(m/60))}:${pad(m%60)}`; }
function daysBetween(a,b){ return Math.round(Math.abs((a.getTime()-b.getTime())/86400000)); }

function slotSig(slot){ return `${slot.day}|${slot.start}`; }

function shiftIsoDateToWeekday(dateStr, targetDay){
  const d=parseD(dateStr);
  d.setDate(d.getDate() + (targetDay - d.getDay()));
  return toStr(d);
}

function areSchedulesEquivalent(a,b){
  if((a?.length||0)!==(b?.length||0)) return false;
  const norm=(arr)=>(arr||[]).map(sl=>`${sl.day}|${sl.start}|${sl.end}`).sort();
  const na=norm(a), nb=norm(b);
  for(let i=0;i<na.length;i++) if(na[i]!==nb[i]) return false;
  return true;
}

function buildSlotMigrationMap(oldSlots,newSlots){
  const oldList=(oldSlots||[]).map(sl=>({day:sl.day,start:sl.start}));
  const newList=(newSlots||[]).map(sl=>({day:sl.day,start:sl.start}));
  const map=new Map();
  const usedNew=new Set();

  for(const os of oldList){
    const idx=newList.findIndex((ns,j)=>!usedNew.has(j)&&ns.day===os.day&&ns.start===os.start);
    if(idx>=0){
      map.set(slotSig(os), newList[idx]);
      usedNew.add(idx);
    }
  }

  const remOld=oldList.filter(os=>!map.has(slotSig(os)));
  while(remOld.length){
    let best=null;
    for(const os of remOld){
      for(let j=0;j<newList.length;j++){
        if(usedNew.has(j)) continue;
        const ns=newList[j];
        const cost=Math.abs(ns.day-os.day)*1440 + Math.abs(tMin(ns.start)-tMin(os.start));
        if(!best||cost<best.cost) best={os,ns,idx:j,cost};
      }
    }
    if(!best) break;
    map.set(slotSig(best.os), best.ns);
    usedNew.add(best.idx);
    remOld.splice(remOld.indexOf(best.os),1);
  }
  return map;
}

function migrateSubjectStoreKeys(store,subId,oldSlots,newSlots){
  const slotMap=buildSlotMigrationMap(oldSlots,newSlots);
  const next={};
  const prefix=`${subId}_`;

  for(const[k,v] of Object.entries(store||{})){
    if(!k.startsWith(prefix)){ next[k]=v; continue; }

    const rest=k.slice(prefix.length);
    const splitAt=rest.lastIndexOf('_');
    if(splitAt<=0){ next[k]=v; continue; }

    const date=rest.slice(0,splitAt);
    const hhmm=rest.slice(splitAt+1);
    if(!isIsoDate(date)||!/^[0-9]{4}$/.test(hhmm)){ next[k]=v; continue; }

    const oldStart=`${hhmm.slice(0,2)}:${hhmm.slice(2)}`;
    const oldSig=`${parseD(date).getDay()}|${oldStart}`;
    const mapped=slotMap.get(oldSig);
    if(!mapped) continue; // removed slot: drop stale key

    const newDate=shiftIsoDateToWeekday(date,mapped.day);
    const newKey=`${subId}_${newDate}_${mapped.start.replace(':','')}`;
    if(!(newKey in next)) next[newKey]=v;
  }
  return next;
}

function migrateSubjectDataKeys(subId,oldSlots,newSlots){
  S.attendance=migrateSubjectStoreKeys(S.attendance,subId,oldSlots,newSlots);
  S.offClasses=migrateSubjectStoreKeys(S.offClasses,subId,oldSlots,newSlots);
}

function getWeekMon(offset=0) {
  const now = new Date();
  now.setDate(now.getDate() + offset*7);
  const day = now.getDay();
  const diff = day===0 ? -6 : 1-day;
  const mon = new Date(now);
  mon.setDate(now.getDate()+diff);
  mon.setHours(0,0,0,0);
  return mon;
}
function getWeekDates(offset=0) {
  const mon = getWeekMon(offset);
  return Array.from({length:6},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function getTimeRange() {
  let minH=8, maxH=20;
  for (const s of S.subjects) {
    for (const sl of (s.schedule||[])) {
      if (!sl.start||!sl.end) continue;
      minH = Math.min(minH, Math.floor(tMin(sl.start)/60));
      maxH = Math.max(maxH, Math.ceil(tMin(sl.end)/60));
    }
  }
  return { start: Math.max(0,minH-1), end: Math.min(24,maxH+1) };
}

// Returns [{date, slot}] — one entry per class instance (multiple per day possible)
function genClasses(sub) {
  if (_rc.gc?.has(sub.id)) return _rc.gc.get(sub.id);
  if (!S.semStart || !sub.schedule?.length) return [];
  const start = parseD(S.semStart);
  let end;
  if (S.semEnd) {
    end = parseD(S.semEnd);
  } else {
    end = new Date();
    end.setDate(end.getDate() + NO_SEM_END_LOOKAHEAD_DAYS);
  }
  end = new Date(end); end.setHours(23,59,59,999);
  const res=[], cur=new Date(start);
  while (cur<=end) {
    const dow = cur.getDay();
    const dateStr = toStr(new Date(cur));
    for (const slot of sub.schedule) {
      if (slot.day===dow) res.push({date:dateStr, slot});
    }
    cur.setDate(cur.getDate()+1);
  }
  _rc.gc?.set(sub.id, res);
  return res;
}

function isActive(subId, date, slot) {
  return !S.offClasses[classKey(subId,date,slot)] && !S.offDays.includes(date);
}

function getClassContext(subId, date, startTime){
  const s = S.subjects.find(x=>x.id===subId);
  if(!s) return null;
  const day = parseD(date).getDay();
  const slot = s.schedule?.find(x=>x.day===day&&x.start===startTime);
  if(!slot) return null;
  const key = classKey(subId,date,slot);
  const active = isActive(subId,date,slot);
  const today = toStr(new Date());
  const isPast = date<=today;
  const isDayOff = S.offDays.includes(date);
  const isClsOff = !!S.offClasses[key];
  const inSem = date>=S.semStart&&(!S.semEnd||date<=S.semEnd);
  return {s,slot,key,active,isPast,isDayOff,isClsOff,inSem};
}

function canDirectMark(ctx){
  return !!ctx && ctx.active && ctx.isPast && ctx.inSem;
}

function cycleBlockAttendance(subId,date,startTime){
  const ctx=getClassContext(subId,date,startTime);
  if(!canDirectMark(ctx)) return false;
  const cur=S.attendance[ctx.key];
  if(cur===undefined){
    S.attendance[ctx.key]=true;
    toast('Clase marcada como asistida', 'ok');
  } else if(cur===true){
    S.attendance[ctx.key]=false;
    toast('Clase marcada como falta', 'warn');
  } else {
    delete S.attendance[ctx.key];
    toast('Marca de asistencia eliminada', 'info');
  }
  saveState();
  return true;
}

const blockTouchState = new WeakMap();

function prefersTouchBlockGesture(){
  return !!window.matchMedia?.('(pointer: coarse)').matches || !!window.matchMedia?.('(hover: none)').matches;
}

function onCalendarBlockClick(event,el){
  if(prefersTouchBlockGesture()){
    event.preventDefault();
    return;
  }
  if(!el?.dataset) return;
  openQuick(el.dataset.subId,el.dataset.date,el.dataset.startTime);
}

function onCalendarBlockTouchStart(event,el){
  if(!prefersTouchBlockGesture()||!el?.dataset) return;
  const t=event.touches?.[0];
  if(!t) return;
  const state={startX:t.clientX,startY:t.clientY,moved:false,longPress:false,timer:0};
  state.timer=window.setTimeout(()=>{
    state.longPress=true;
    blockTouchState.set(el,state);
    openQuick(el.dataset.subId,el.dataset.date,el.dataset.startTime);
  }, MOBILE_LONG_PRESS_MS);
  blockTouchState.set(el,state);
}

function onCalendarBlockTouchMove(event,el){
  const state=blockTouchState.get(el);
  if(!state) return;
  const t=event.touches?.[0];
  if(!t) return;
  if(Math.abs(t.clientX-state.startX)>10||Math.abs(t.clientY-state.startY)>10){
    state.moved=true;
    if(state.timer){ clearTimeout(state.timer); state.timer=0; }
    blockTouchState.set(el,state);
  }
}

function onCalendarBlockTouchEnd(event,el){
  const state=blockTouchState.get(el);
  if(!state||!el?.dataset) return;
  if(state.timer){ clearTimeout(state.timer); state.timer=0; }
  blockTouchState.delete(el);
  if(state.longPress||state.moved) return;
  event.preventDefault();
  const{subId,date,startTime}=el.dataset;
  if(!cycleBlockAttendance(subId,date,startTime)) openQuick(subId,date,startTime);
}

function onCalendarBlockTouchCancel(_event,el){
  const state=blockTouchState.get(el);
  if(!state) return;
  if(state.timer) clearTimeout(state.timer);
  blockTouchState.delete(el);
}

function calcStats(sub) {
  if (_rc.cs?.has(sub.id)) return _rc.cs.get(sub.id);
  const today = toStr(new Date());
  const all = genClasses(sub);
  const past = all.filter(c => c.date <= today);
  const future = all.filter(c => c.date > today);
  
  let actPast = 0, attended = 0, absent = 0, unmarked = 0;
  for(const {date, slot} of past) {
    if(!isActive(sub.id, date, slot)) continue;
    actPast++;
    const v = S.attendance[classKey(sub.id, date, slot)];
    if(v === true) attended++;
    else if(v === false) absent++;
    else unmarked++;
  }
  
  let actFut = 0;
  for(const {date, slot} of future) { 
    if(isActive(sub.id, date, slot)) actFut++; 
  }
  
  const total = actPast + actFut;
  
  // pct basado solo en clases explícitamente marcadas
  const markedPast = attended + absent;
  const pct = markedPast > 0 ? (attended / markedPast * 100) : null;
  
  const status = pct === null ? 'unknown' : pct >= sub.minAtt ? 'ok' : pct >= sub.minAtt - 10 ? 'warning' : 'danger';
  
  let canMiss = null;
  if(S.semEnd && total > 0) {
    const req = Math.ceil(total * sub.minAtt / 100);
    // canMiss basado en el máximo posible a futuro
    canMiss = (attended + actFut) - req;
  }
  
  const result = {actPast, attended, absent, unmarked, actFut, total, pct, canMiss, status};
  _rc.cs?.set(sub.id, result);
  return result;
}

function calcGlobalStats() {
  const totals = { actPast: 0, attended: 0, absent: 0, unmarked: 0 };
  for (const sub of S.subjects) {
    const st = calcStats(sub);
    totals.actPast += st.actPast;
    totals.attended += st.attended;
    totals.absent += st.absent;
    totals.unmarked += st.unmarked;
  }
  const pct = totals.actPast > 0 ? (totals.attended / totals.actPast) * 100 : null;
  const status = pct === null ? 'unknown' : pct >= 75 ? 'ok' : pct >= 65 ? 'warning' : 'danger';
  return {...totals, pct, status};
}

let curView   = 'cal';   // 'cal' | 'list' | 'detail'

function switchView(v) {
  curView=v;
  document.getElementById('tab-cal').classList.toggle('active',v==='cal');
  document.getElementById('tab-list').classList.toggle('active',v==='list');
  render();
}
function goDetail(id) { curView='detail'; detailId=id; render(); }
function goBack()     {
  const prev = detailId ? 'list' : 'cal';
  curView=prev; detailId=null; render();
  document.getElementById('tab-list').classList.toggle('active',prev==='list');
  document.getElementById('tab-cal').classList.toggle('active',prev==='cal');
}
function shiftMobileDay(delta) { mobileDayOffset += delta; render(); }
function isMobileDayView() { return window.innerWidth <= 600; }

function render() {
  _rc = { gc: new Map(), cs: new Map() };
  const main=document.getElementById('main');
  if(curView==='cal')         main.innerHTML=renderCal();
  else if(curView==='list')   main.innerHTML=renderList();
  else if(curView==='detail') main.innerHTML=renderDetail();

  if(curView==='cal') positionBlocks();
  refreshIcons();
}

// ── CALENDAR ──
function renderCal() {
  if (isMobileDayView()) return renderCalMobile();
  const dates  = getWeekDates(weekOffset);
  const today  = toStr(new Date());
  const {start:SH, end:EH} = getTimeRange();
  const totalH = EH - SH;
  const bodyH  = totalH * HOUR_PX;

  // Week range label
  const d0=dates[0], d5=dates[5];
  const rangeLabel=`${d0.getDate()} ${MONTHS_S[d0.getMonth()]} — ${d5.getDate()} ${MONTHS_S[d5.getMonth()]} ${d5.getFullYear()}`;

  const nav=`<div class="cal-nav">
    <button class="btn btn-s" onclick="weekOffset--;render()">← Anterior</button>
    <span class="cal-range">${rangeLabel}</span>
    <button class="btn btn-s" onclick="weekOffset++;render()">Siguiente →</button>
    <button class="btn btn-g" onclick="weekOffset=0;render()">Hoy</button>
  </div>`;

  if(!S.subjects.length){
    return `${nav}
    <div class="cal-empty-wrap">
      <div class="empty-state cal-empty-state">
        <div class="eico">${icon('calendar')}</div>
        <h2>Tu semana está vacía</h2>
        <p>Agrega tu primer ramo para visualizar bloques y marcar asistencia.</p>
        <button class="btn btn-p" onclick="openSubjModal(null)">${icon('plus','btn-ico')}<span class="btn-label">Agregar primer ramo</span></button>
      </div>
    </div>`;
  }

  // Build grid rows: 1 header row + totalH rows
  // Grid: 52px time col + 6 day cols
  let gridHTML = '';

  // Corner cell (top-left)
  gridHTML += `<div class="cal-corner" style="grid-row:1;grid-column:1"></div>`;

  // Day header cells
  dates.forEach((date,i)=>{
    const ds=toStr(date);
    const isTod=ds===today;
    gridHTML+=`<div class="cal-dh${isTod?' today-col':''}" style="grid-row:1;grid-column:${i+2}">
      <div class="cal-dh-name">${DAYS_S[date.getDay()]}</div>
      <div class="cal-dh-date${isTod?' today-num':''}">${date.getDate()} ${MONTHS_S[date.getMonth()]}</div>
    </div>`;
  });

  // Time + day cells for each hour
  for(let h=0;h<totalH;h++){
    const hour=SH+h;
    const row=h+2;
    // time label cell
    gridHTML+=`<div class="time-cell" style="grid-row:${row};grid-column:1">
      <span>${pad(hour)}:00</span>
    </div>`;
    // day cells
    dates.forEach((date,i)=>{
      const ds=toStr(date);
      const isTod=ds===today;
      const inSem=ds>=S.semStart&&(!S.semEnd||ds<=S.semEnd);
      gridHTML+=`<div class="day-cell${isTod?' today-col':''}${!inSem?' out-sem':''}"
                      style="grid-row:${row};grid-column:${i+2}"
                      data-date="${ds}" data-hour="${hour}"></div>`;
    });
  }

  // Class blocks (absolutely positioned — done after render via positionBlocks())
  // We create wrapper divs per day column that span all rows
  dates.forEach((date,i)=>{
    const ds=toStr(date);
    const isTod=ds===today;
    gridHTML+=`<div class="day-blocks-layer${isTod?' today-col':''}"
                    style="grid-row:2/span ${totalH};grid-column:${i+2};position:relative;pointer-events:none"
                    id="dbl-${ds}"></div>`;
  });

  return `${nav}
  <div class="cal-outer">
    <div class="cal-grid" id="cg" style="--totalH:${totalH}">
      ${gridHTML}
    </div>
  </div>`;
}

// ── MOBILE DAY VIEW ──
function renderCalMobile() {
  const today = toStr(new Date());
  const base = new Date();
  base.setDate(base.getDate() + mobileDayOffset);
  base.setHours(0,0,0,0);
  const ds = toStr(base);
  const isToday = ds === today;

  // Week dots: Mon–Sat of the week containing `base`
  const dow = base.getDay();
  const diffToMon = dow === 0 ? -6 : 1 - dow;
  const weekMon = new Date(base);
  weekMon.setDate(base.getDate() + diffToMon);
  const todayDate = parseD(today);
  todayDate.setHours(0,0,0,0);

  const weekDates = Array.from({length:6}, (_,i) => {
    const d = new Date(weekMon);
    d.setDate(weekMon.getDate() + i);
    return d;
  });
  const dotsHtml = weekDates.map(d => {
    const dStr = toStr(d);
    const diffFromToday = Math.round((d.getTime() - todayDate.getTime()) / 86400000);
    const isActive = dStr === ds;
    const isTod = dStr === today;
    return `<button class="mob-dot-btn${isActive?' mob-dot-active':''}${isTod&&!isActive?' mob-dot-today':''}"
        onclick="mobileDayOffset=${diffFromToday};render()" aria-label="${DAYS_F[d.getDay()]} ${d.getDate()}">
      <span class="mob-dot-initial">${DAYS_S[d.getDay()]}</span>
      <span class="mob-dot-day">${d.getDate()}</span>
    </button>`;
  }).join('');

  const nav = `<div class="cal-nav">
    <button class="btn btn-s" onclick="shiftMobileDay(-1)" aria-label="Día anterior">‹</button>
    <div class="cal-range">
      <div class="mob-day-bigname${isToday?' mob-today':''}">${DAYS_F[base.getDay()]}</div>
      <div class="mob-day-bigdate">${base.getDate()} ${MONTHS_S[base.getMonth()]} ${base.getFullYear()}</div>
    </div>
    <button class="btn btn-s" onclick="shiftMobileDay(1)" aria-label="Día siguiente">›</button>
    <button class="btn btn-g" onclick="mobileDayOffset=0;render()">Hoy</button>
  </div>
  <div class="mob-week-dots" role="tablist" aria-label="Días de la semana">${dotsHtml}</div>`;

  if (!S.subjects.length) {
    return `${nav}
    <div class="cal-empty-wrap">
      <div class="empty-state cal-empty-state">
        <div class="eico">${icon('calendar')}</div>
        <h2>Tu semana está vacía</h2>
        <p>Agrega tu primer ramo para visualizar bloques y marcar asistencia.</p>
        <button class="btn btn-p" onclick="openSubjModal(null)">${icon('plus','btn-ico')}<span class="btn-label">Agregar primer ramo</span></button>
      </div>
    </div>`;
  }

  const inSemDay = ds >= S.semStart && (!S.semEnd || ds <= S.semEnd);
  const isDayOff = S.offDays.includes(ds);

  const dayClasses = [];
  for (const s of S.subjects) {
    for (const slot of (s.schedule||[])) {
      if (slot.day === base.getDay()) dayClasses.push({s, slot});
    }
  }
  dayClasses.sort((a,b) => tMin(a.slot.start) - tMin(b.slot.start));

  let classesHtml = '';
  if (isDayOff) {
    classesHtml = `<div class="mob-day-off">${icon('ban','ico-inline')} Día libre</div>`;
  } else if (dayClasses.length === 0) {
    classesHtml = `<div class="mob-no-classes">${icon('coffee','ico-inline')} Sin clases este día</div>`;
  } else {
    classesHtml = dayClasses.map(({s,slot}) => renderMobileCls(s, ds, slot, today, inSemDay)).join('');
  }

  return `${nav}
  <div class="mob-day-wrap" id="mob-day-wrap"
    ontouchstart="mobSwipeStart(event)"
    ontouchmove="mobSwipeMove(event)"
    ontouchend="mobSwipeEnd(event)">
    ${classesHtml}
  </div>`;
}

function renderMobileCls(s, ds, slot, today, inSem) {
  const key = classKey(s.id, ds, slot);
  const active = isActive(s.id, ds, slot);
  const att = S.attendance[key];
  const isPast = ds <= today;
  const isDayOff = S.offDays.includes(ds);
  const isClsOff = !!S.offClasses[key];

  let statusCls = '';
  if (!inSem || !active) statusCls = 'mob-cls-off';
  else if (att === true)  statusCls = 'mob-cls-att';
  else if (att === false) statusCls = 'mob-cls-abs';

  const badge = att === true
    ? `<span class="mob-cls-badge mob-badge-ok">✓</span>`
    : att === false
    ? `<span class="mob-cls-badge mob-badge-bad">✗</span>`
    : (isPast && active && inSem ? `<span class="mob-cls-badge mob-badge-warn">?</span>` : '');

  let actBtns = '';
  if (active && isPast && inSem) {
    actBtns = `<button class="mob-att-btn mob-att-ok${att===true?' active':''}" onclick="markCls('${s.id}','${ds}','${slot.start}',true)">✓ Asistí</button>
      <button class="mob-att-btn mob-att-bad${att===false?' active':''}" onclick="markCls('${s.id}','${ds}','${slot.start}',false)">✗ Falta</button>`;
  } else if (!active) {
    actBtns = `<span class="mob-cls-label">${isDayOff?'Día libre':'Cancelada'}</span>`;
  } else {
    actBtns = `<span class="mob-cls-label">Próxima</span>`;
  }

  let offBtn = '';
  if (inSem && !isDayOff) {
    offBtn = isClsOff
      ? `<button class="mob-off-btn" onclick="toggleCls('${s.id}','${ds}','${slot.start}')">↩ Reactivar</button>`
      : `<button class="mob-off-btn" onclick="toggleCls('${s.id}','${ds}','${slot.start}')">${icon('ban','ico-inline')} Cancelar</button>`;
  }

  return `<div class="mob-cls-item ${statusCls}" style="border-left-color:${s.color}">
    <div class="mob-cls-header">
      <div class="mob-cls-info">
        <div class="mob-cls-name">${esc(s.name)}</div>
        <div class="mob-cls-meta">${slot.start}–${slot.end} · ${esc(s.type)}</div>
      </div>
      ${badge}
    </div>
    <div class="mob-cls-actions">${actBtns}${offBtn}</div>
  </div>`;
}

// Swipe left/right for day navigation
let _msx = null, _msy = null;
function mobSwipeStart(ev) {
  if (ev.touches.length !== 1) return;
  _msx = ev.touches[0].clientX;
  _msy = ev.touches[0].clientY;
}
function mobSwipeMove(ev) { /* allow normal scroll */ }
function mobSwipeEnd(ev) {
  if (_msx === null) return;
  const dx = ev.changedTouches[0].clientX - _msx;
  const dy = Math.abs(ev.changedTouches[0].clientY - _msy);
  _msx = null; _msy = null;
  if (Math.abs(dx) < 60 || dy > Math.abs(dx) * 0.8) return;
  shiftMobileDay(dx < 0 ? 1 : -1);
}

function positionBlocks() {
  const {start:SH} = getTimeRange();
  const today = toStr(new Date());
  const dates  = getWeekDates(weekOffset);
  const now    = new Date();
  const minBlockHeight = window.matchMedia?.('(pointer: coarse)').matches ? 44 : 18;

  dates.forEach(date=>{
    const ds=toStr(date);
    const layer=document.getElementById(`dbl-${ds}`);
    if(!layer) return;
    layer.style.pointerEvents='auto';

    let html='';

    // Today's time line
    if(ds===today){
      const nowY=(now.getHours()+now.getMinutes()/60-SH)*HOUR_PX;
      if(nowY>=0){
        html+=`<div class="now-line" style="top:${nowY}px"><div class="now-dot"></div></div>`;
      }
    }

    for(const s of S.subjects){
      const slots=(s.schedule||[]).filter(x=>x.day===date.getDay());
      for(const slot of slots) {

      const active=isActive(s.id,ds,slot);
      const att=S.attendance[classKey(s.id,ds,slot)];
      const isPast=ds<=today;
      const inSem=ds>=S.semStart&&(!S.semEnd||ds<=S.semEnd);

      let cls='cls-future';
      if(!inSem) cls='cls-cancelled';
      else if(!active) cls='cls-cancelled';
      else if(att===true) cls='cls-attended';
      else if(att===false) cls='cls-absent';
      else if(isPast) cls='cls-unmarked';

      // opacity per status so the color is always visible
      const bgOpacity = cls==='cls-cancelled' ? '18'
                      : cls==='cls-attended'  ? '55'
                      : cls==='cls-absent'    ? '30'
                      : cls==='cls-unmarked'  ? '40'
                      : '30'; // future

      const statusIcon = cls==='cls-attended' ? '<span class="sico sico-ok">✓</span>'
                       : cls==='cls-absent'   ? '<span class="sico sico-bad">✗</span>'
                       : cls==='cls-unmarked' ? '<span class="sico sico-warn">?</span>'
                       : '';
      const canQuickMark=active&&isPast&&inSem;
      const quickActions=canQuickMark ? `
        <div class="cls-actions">
          <button class="cls-act cls-act-ok${att===true?' on':''}" title="Asistí" onclick="event.stopPropagation();markCls('${s.id}','${ds}','${slot.start}',true)">✓</button>
          <button class="cls-act cls-act-bad${att===false?' on':''}" title="Falté" onclick="event.stopPropagation();markCls('${s.id}','${ds}','${slot.start}',false)">✗</button>
        </div>` : '';

      const startM=tMin(slot.start);
      const endM  =tMin(slot.end);
      const top   =(startM-SH*60)/60*HOUR_PX;
      const height=Math.max((endM-startM)/60*HOUR_PX-3, minBlockHeight);

      html+=`<div class="cls-block ${cls}${canQuickMark?' cls-markable':''}"
                  style="top:${top}px;height:${height}px;border-color:${s.color};background:${s.color}${bgOpacity};pointer-events:auto"
                  data-sub-id="${esc(s.id)}"
                  data-date="${ds}"
                  data-start-time="${slot.start}"
                  onclick="onCalendarBlockClick(event,this)"
                  ontouchstart="onCalendarBlockTouchStart(event,this)"
                  ontouchmove="onCalendarBlockTouchMove(event,this)"
                  ontouchend="onCalendarBlockTouchEnd(event,this)"
                  ontouchcancel="onCalendarBlockTouchCancel(event,this)">
        <div class="cls-bname">${statusIcon}${esc(s.name)}</div>
        <div class="cls-btype">${esc(s.type)} · ${slot.start}–${slot.end}</div>
        ${quickActions}
      </div>`;
      } // end for slot
    } // end for subject
    layer.innerHTML=html;
  });
}

// ── LIST VIEW ──
function renderList() {
  if(!S.subjects.length) return `
    <div class="list-wrap"><div class="empty-state">
      <div class="eico">${icon('book-open')}</div>
      <h2>Sin ramos</h2>
      <p>Agrega tus ramos para comenzar.</p>
      <button class="btn btn-p" onclick="openSubjModal(null)">${icon('plus','btn-ico')}<span class="btn-label">Agregar primer ramo</span></button>
    </div></div>`;

  // Build ordered card list: groups appear at position of their first subject
  const seen = new Set();
  const order = [];
  for (const s of S.subjects) {
    if (s.group) {
      const k = `g:${s.group}`;
      if (!seen.has(k)) { seen.add(k); order.push(k); }
    } else {
      order.push(`s:${s.id}`);
    }
  }

  const cards = order.map(k => {
    if (k.startsWith('g:')) {
      const gname = k.slice(2);
      return renderGroupCard(gname, S.subjects.filter(s=>s.group===gname));
    }
    const subj=S.subjects.find(s=>s.id===k.slice(2));
    return `<div class="group-wrap"><div class="glabel"><span class="glabel-name">&nbsp;</span></div><div class="group-cards">${renderCard(subj)}</div></div>`;
  }).join('');

  const semEnd=S.semEnd?fmtDate(S.semEnd):'hoy';
  const globalCard = renderGlobalStatsCard();
  return `<div class="list-wrap">
    <div class="list-top">
      <div style="color:var(--muted);font-size:13px">
        ${icon('calendar','ico-inline')} Semestre: <strong style="color:var(--text)">${fmtDate(S.semStart)}</strong>
        → <strong style="color:var(--text)">${semEnd}</strong>
      </div>
      ${globalCard}
    </div>
    <div class="list-grid">${cards}</div>
  </div>`;
}

function renderGlobalStatsCard() {
  const g = calcGlobalStats();
  const pctStr = g.pct !== null ? `${g.pct.toFixed(1)}%` : '—';
  const classesStr = `${g.attended}/${g.actPast}`;
  const note = g.actPast
    ? `${g.absent} falta${g.absent!==1?'s':''}${g.unmarked?` · ${g.unmarked} sin marcar`:''}`
    : 'Aún no hay clases pasadas para resumir';

  return `<div class="global-card">
    <div class="global-card-head">
      <span class="global-card-title">Resumen Global Del Semestre</span>
      <span class="badge">Dashboard</span>
    </div>

      <div class="global-line">
        <span>Asistencia global</span>
        <strong class="${g.status}">${pctStr}</strong>
      </div>
      <div class="global-line">
        <span>Clases asistidas</span>
        <strong>${classesStr}</strong>

function groupOverallStatus(subjects) {
  const statuses = subjects.map(s => calcStats(s).status);
  if (statuses.every(s => s==='ok'))                         return {cls:'ok',     label:'✓ Aprueba'};
  if (statuses.some(s => s==='danger'))                      return {cls:'danger',  label:'✗ No aprueba'};
  if (statuses.some(s => s==='warning'))                     return {cls:'warning', label:'⚠ En riesgo'};
  return {cls:'unknown', label:'~ Sin datos'};
}

function renderGroupCard(groupName, subjects) {
  const overall = groupOverallStatus(subjects);
  return `<div class="group-wrap" style="grid-column:span ${subjects.length}">
    <div class="glabel">
      <span class="glabel-name">${esc(groupName)}</span>
      <span class="gstatus ${overall.cls}">${overall.label}</span>

}

function renderRow(s,date,slot,today) {
  const isDayOff=S.offDays.includes(date);

  const active=!isDayOff&&!isClsOff;
  const att=S.attendance[classKey(s.id,date,slot)];
  const isPast=date<=today;
  const timeStr=`${slot.start}–${slot.end}`;
  const st=slot.start; // for onclick params

  let rowCls='';
  if(!active) rowCls='off';
  else if(att===true) rowCls='att';
  else if(att===false) rowCls='abs';

    marks=`
      <button class="mbtn ok${att===true?' ma':''}" onclick="markCls('${s.id}','${date}','${st}',true)">✓ Asistí</button>
      <button class="mbtn bad${att===false?' ma':''}" onclick="markCls('${s.id}','${date}','${st}',false)">✗ Falta</button>`;
  } else if(!active){
    marks=`<span class="clbl">${isDayOff?'Día libre':'Cancelada'}</span>`;
  } else {
    marks=`<span class="clbl">Próxima</span>`;
  }

  let offBtn='';
  if(!isDayOff){
    if(isClsOff)
      offBtn=`<button class="offbtn reac" onclick="toggleCls('${s.id}','${date}','${st}')">↩ Reactivar</button>`;
    else
      offBtn=`<button class="offbtn" onclick="toggleCls('${s.id}','${date}','${st}')" title="Cancelar clase">${icon('ban')}</button>`;
  }

  return `<div class="crow ${rowCls}">
    <div>
      <div class="cdate">${fmtDate(date)}</div>
      <div style="font-size:11px;color:var(--muted)">${timeStr}</div>
    </div>
    <div class="cacts">${marks}${offBtn}</div>
  </div>`;
}

// ACTIONS
// ════════════════════════════════════════
function markCls(subId,date,startTime,val){
  const key=`${subId}_${date}_${startTime.replace(':','')}`;
  const cur = S.attendance[key];
  if(cur===val) {
    delete S.attendance[key];
    saveState();
    toast('Marca de asistencia eliminada', 'info');
    return;
  }
  S.attendance[key]=val;
  saveState();
  toast(val ? 'Clase marcada como asistida' : 'Clase marcada como falta', val ? 'ok' : 'warn');
}

function toggleCls(subId,date,startTime){
  const key=`${subId}_${date}_${startTime.replace(':','')}`;
  if(S.offClasses[key]) {
    delete S.offClasses[key];
    saveState();
    toast('Clase reactivada', 'ok');
    return;
  }
  S.offClasses[key]=true;
  delete S.attendance[key];
  saveState();
  toast('Clase cancelada', 'warn');
}

function addOffDay(date){
  if(!S.offDays.includes(date)){
    S.offDays.push(date);
    saveState();
    toast('Día inhabilitado', 'ok');
  }
}
function removeOffDay(date){
  const next = S.offDays.filter(d=>d!==date);
  if(next.length===S.offDays.length) return;
  S.offDays=next;
  saveState();
  toast('Día reactivado', 'ok');
}
function delSubject(id){
  const removingViewedDetail = curView==='detail' && detailId===id;
  S.subjects=S.subjects.filter(s=>s.id!==id);
  for(const k of Object.keys(S.attendance)) if(k.startsWith(id+'_')) delete S.attendance[k];
  for(const k of Object.keys(S.offClasses)) if(k.startsWith(id+'_')) delete S.offClasses[k];
  if(removingViewedDetail){
    curView='list';
    detailId=null;
    document.getElementById('tab-list')?.classList.add('active');
    document.getElementById('tab-cal')?.classList.remove('active');
  }
  saveState();
  toast('Ramo eliminado', 'warn');
}

function enableModalSwipeDownClose(){
  if(!window.matchMedia?.('(pointer: coarse)').matches) return;
  const overlay=document.querySelector('#mc .overlay');
  if(!overlay) return;
  const panel=overlay.querySelector('.modal, .qpop');
  if(!panel) return;

  let tracking=false;
  let startX=0, startY=0, dragY=0;

  const resetPanel=()=>{
    panel.style.transition='transform .18s ease, opacity .18s ease';
    panel.style.transform='';
    panel.style.opacity='';
  };

  overlay.addEventListener('touchstart', (ev)=>{
    if(ev.touches.length!==1) return;
    const t=ev.touches[0];
    const rect=panel.getBoundingClientRect();
    const topZone=rect.top+Math.min(92, rect.height*0.28);
    if(t.clientY>topZone) return;
    tracking=true;
    startX=t.clientX;
    startY=t.clientY;
    dragY=0;
    panel.style.transition='none';
  }, {passive:true});

  overlay.addEventListener('touchmove', (ev)=>{
    if(!tracking||ev.touches.length!==1) return;
    const t=ev.touches[0];
    const dx=t.clientX-startX;
    const dy=t.clientY-startY;
    if(dy<=0||Math.abs(dx)>Math.max(28,dy)) return;
    dragY=Math.min(dy,220);
    panel.style.transform=`translateY(${dragY}px)`;
    panel.style.opacity=String(Math.max(0.72,1-dragY/260));
  }, {passive:true});

  const finish=()=>{
    if(!tracking) return;
    tracking=false;
    if(dragY>=90){ closeM(); return; }
    resetPanel();
  };

  overlay.addEventListener('touchend', finish, {passive:true});
  overlay.addEventListener('touchcancel', finish, {passive:true});
}

function openModal(html){
  document.getElementById('mc').innerHTML=html;
  enableModalSwipeDownClose();
  refreshIcons();
}
function closeModal(e)  { if(e&&e.target!==e.currentTarget)return; closeM(); }

  openModal(`<div class="overlay" onclick="closeModal(event)">
    <div class="qpop">
      <div class="qpop-title" style="color:${s.color}">${esc(s.name)}</div>
      <div class="qpop-sub">${fmtDateLong(date)}${timeStr?' · '+timeStr:''} · ${esc(s.type)}</div>
      <div class="qpop-btns">
        ${markBtns}
        <hr class="qpop-sep">
        ${offBtn}
        <button class="btn btn-g" onclick="closeM();goDetail('${subId}')">Ver historial →</button>
        <button class="btn btn-g" onclick="closeM()">Cerrar</button>
      </div>
    </div>
  </div>`);
}

// ── Subject Modal ──
let editingSched = []; // [{day, start, end}] — temp state for the open modal
let editingColor = COLORS[0];

function openSubjModal(editId){
  const s=editId?S.subjects.find(x=>x.id===editId):null;
  const nm=s?s.name:'', tp=s?s.type:'Teoría';
  const mn=s?s.minAtt:75, col=normalizeColor(s?s.color:COLORS[0]);

  // seed the editing schedule from existing data (or empty)
  editingSched = s
    ? s.schedule.map(sl=>({day:sl.day,start:sl.start,end:sl.end,persisted:true}))
    : [];
  editingColor = col;

  const hasPresetType = SUBJECT_TYPES.includes(tp);
  const selectedType = hasPresetType ? tp : SUBJECT_TYPE_OTHER;
  const customTypeValue = hasPresetType || tp === SUBJECT_TYPE_OTHER ? '' : tp;
  const typeOpts=[...SUBJECT_TYPES, SUBJECT_TYPE_OTHER]
    .map(t=>`<option value="${t}"${selectedType===t?' selected':''}>${t}</option>`).join('');

  const colHtml=COLORS.map(c=>`
    <input type="radio" class="colr" name="col" id="c${c.slice(1)}" value="${c}" onchange="setPresetColor(this.value)"${col===c?' checked':''}>
    <label class="colsw" for="c${c.slice(1)}" style="background:${c}"></label>`).join('');

  // existing group names for datalist
  const existingGroups = [...new Set(S.subjects.filter(s=>s.group&&s.id!==editId).map(s=>s.group))];
  const groupDatalist = existingGroups.map(g=>`<option value="${esc(g)}">`).join('');
  const grp = s?.group || '';

  openModal(`<div class="overlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="mhd">
        <h3>${editId?'Editar ramo':'Agregar ramo'}</h3>
        <button class="mclose" onclick="closeM()">✕</button>
      </div>
      <div class="mbody">
        <div class="fg">
          <label class="fl">Nombre del ramo</label>
          <input class="fi" id="fn" placeholder="Ej: Cálculo Diferencial" value="${esc(nm)}">
        </div>
        <div class="frow">
          <div class="fg">
            <label class="fl">Tipo</label>
            <select class="fsel" id="ft" onchange="onTypeSelectChange(this.value)">${typeOpts}</select>
          </div>
          <div class="fg">
            <label class="fl">% mínimo de asistencia</label>
            <input class="fi" id="fm" type="number" min="0" max="100" value="${mn}">
          </div>
        </div>
        <div class="fg" id="ft-custom-wrap" style="${selectedType===SUBJECT_TYPE_OTHER?'':'display:none'}">
          <label class="fl">Tipo personalizado (opcional)</label>
          <input class="fi" id="ftc" maxlength="40" placeholder="Ej: Ayudantía" value="${esc(customTypeValue)}">
          <div class="fhint">Si lo dejas vacío, se guardará como "Otro".</div>
        </div>
        <div class="fg">
          <label class="fl">Grupo (opcional)</label>
          <input class="fi" id="fg" list="gl" placeholder="Ej: Cálculo Diferencial" value="${esc(grp)}">
          <datalist id="gl">${groupDatalist}</datalist>
          <div class="fhint">Agrupa Teoría + Taller del mismo ramo para ver si apruebas en conjunto</div>
        </div>
        <div class="fg">
          <label class="fl">Bloques de clase</label>
          <div class="sched-list" id="sched-list"></div>
          <button class="sched-add" onclick="addSchedEntry()">+ Agregar bloque horario</button>
          ${editId ? `<div class="fwarn">${icon('info','ico-inline')}<span>Editar bloques recalcula todo el semestre de este ramo (totales y "Puedes faltar X más"). Si cambias días/horas o agregas/quitas bloques, la proyección se ajusta automáticamente.</span></div>` : ''}
        </div>
        <div class="fg">
          <label class="fl">Color</label>
          <div class="color-grid">${colHtml}</div>
          <div class="fhint" style="margin-bottom:7px">Paleta rápida</div>
          <input class="fi" id="fcustom" type="color" value="${col}" oninput="syncCustomColor(this.value)">
          <div class="fhint">También puedes elegir un color personalizado</div>
        </div>
      </div>
      <div class="mfoot">
        <button class="btn btn-s" onclick="closeM()">Cancelar</button>
        <button class="btn btn-p" onclick="saveSubj(${editId?`'${editId}'`:'null'})">
          ${editId?'Guardar cambios':'Agregar ramo'}
        </button>
      </div>
    </div>
  </div>`);

  renderSchedEntries();
}

function renderSchedEntries(){
  const el=document.getElementById('sched-list');
  if(!el) return;
  if(!editingSched.length){
    el.innerHTML='<p style="color:var(--muted);font-size:12px;padding:4px 0">Sin bloques. Agrega al menos uno.</p>';
    return;
  }
  const dayOpts=d=>[1,2,3,4,5,6,0].map(x=>`<option value="${x}"${x===d?' selected':''}>${DAYS_F[x]}</option>`).join('');
  el.innerHTML=editingSched.map((e,i)=>`
    <div class="sched-entry">
      <select class="sched-day" onchange="editingSched[${i}].day=+this.value">${dayOpts(e.day)}</select>
      <input type="time" class="fi-t" value="${e.start}" oninput="editingSched[${i}].start=this.value">
      <span class="sched-arrow">→</span>
      <input type="time" class="fi-t" value="${e.end}" oninput="editingSched[${i}].end=this.value">
      <button class="ibtn" onclick="removeSchedEntry(${i})" title="Quitar">✕</button>
    </div>`).join('');
}

function addSchedEntry(){
  editingSched.push({day:1,start:'08:00',end:'09:30',persisted:false});
  renderSchedEntries();
}

function setPresetColor(value){
  editingColor = normalizeColor(value, COLORS[0]);
  const custom = document.getElementById('fcustom');
  if(custom) custom.value = editingColor;
}

function syncCustomColor(value){
  editingColor = normalizeColor(value, COLORS[0]);
  for(const r of document.querySelectorAll('input[name="col"]')){
    r.checked = r.value.toLowerCase() === editingColor;
  }
}

function onTypeSelectChange(value){
  const wrap=document.getElementById('ft-custom-wrap');
  if(!wrap) return;
  wrap.style.display = value===SUBJECT_TYPE_OTHER ? '' : 'none';
}

function removeSchedEntry(i){
  const entry = editingSched[i];
  if(!entry) return;
  if(entry.persisted){
    const ok = confirm(`¿Quitar este bloque guardado?\n${DAYS_F[entry.day]} ${entry.start}–${entry.end}`);
    if(!ok) return;
  }
  editingSched.splice(i,1);
  renderSchedEntries();
  toast('Bloque horario eliminado', 'warn');
}

function saveSubj(editId){
  const name=document.getElementById('fn').value.trim();
  const typeChoice=document.getElementById('ft').value;
  const customType=(document.getElementById('ftc')?.value||'').trim();
  const type=typeChoice===SUBJECT_TYPE_OTHER ? (customType||SUBJECT_TYPE_OTHER) : typeChoice;
  const minAtt=parseInt(document.getElementById('fm').value);
  const color=normalizeColor(editingColor, COLORS[0]);
  const schedule=editingSched
    .filter(e=>e.start&&e.end)
    .map(e=>({day:e.day,start:e.start,end:e.end}));
  const group=(document.getElementById('fg')?.value||'').trim();

  if(!name)                              { alert('Ingresa el nombre del ramo'); return; }
  if(isNaN(minAtt)||minAtt<0||minAtt>100){ alert('El % debe ser entre 0 y 100'); return; }
  if(!schedule.length)                   { alert('Agrega al menos un bloque horario'); return; }

  const badSlot=schedule.find(sl=>tMin(sl.end)<=tMin(sl.start));
  if(badSlot){
    alert(`Bloque horario inválido en ${DAYS_F[badSlot.day]} (${badSlot.start}–${badSlot.end}). La hora de término debe ser posterior al inicio.`);
    return;
  }

  let scheduleChanged=false;

  if(editId){
    const oldSub=S.subjects.find(x=>x.id===editId);
    if(!oldSub){ alert('No se encontró el ramo a editar'); return; }
    const oldSlots=(oldSub.schedule||[]).map(sl=>({day:sl.day,start:sl.start,end:sl.end}));
    scheduleChanged=!areSchedulesEquivalent(oldSlots,schedule);
    if(scheduleChanged){
      const ok=confirm(
        '⚠️ Cambio de horario\n\n' +
        'Cambiar los bloques horarios reasignará todos tus registros históricos de asistencia al nuevo horario.\n\n' +
        'Esto afecta el historial pasado: si moviste una clase de Lunes a Martes, los registros anteriores ' +
        'pasarán a aparecer como Martes desde el inicio del semestre.\n\n' +
        '¿Deseas continuar de todas formas?'
      );
      if(!ok) return;
    }
    Object.assign(oldSub,{name,type,minAtt,color,schedule,group});
    if(scheduleChanged) migrateSubjectDataKeys(editId,oldSlots,schedule);
  } else {
    S.subjects.push({id:uid(),name,type,minAtt,color,schedule,group});
  }
  closeM(); saveState();
  toast(editId ? 'Ramo actualizado exitosamente' : 'Ramo guardado exitosamente', 'ok');
  if(editId&&scheduleChanged){
    toast('Horario actualizado. Los registros históricos fueron reasignados al nuevo horario.', 'warn');
  }
}

function promptRenameGroup(oldName){
  const newName = prompt(`Renombrar grupo "${oldName}":`, oldName);
  if(!newName||newName.trim()===oldName) return;
  const name = newName.trim();
  for(const s of S.subjects){ if(s.group===oldName) s.group=name; }
  saveState();
  toast('Grupo renombrado', 'ok');
}

function confirmDel(id){
  const s=S.subjects.find(x=>x.id===id);
  if(!s) return;
  openModal(`<div class="overlay" onclick="closeModal(event)">
    <div class="modal" style="max-width:340px">
      <div class="mhd"><h3>Eliminar ramo</h3><button class="mclose" onclick="closeM()">✕</button></div>
      <div class="mbody">
        <p>¿Eliminar <strong>${esc(s.name)}</strong>? Se perderá todo el historial.</p>
      </div>
      <div class="mfoot">
        <button class="btn btn-s" onclick="closeM()">Cancelar</button>
        <button class="btn btn-d" onclick="delSubject('${id}');closeM()">Sí, eliminar</button>
      </div>
    </div>
  </div>`);
}

// ── Day off modal ──
function openDayModal(){
  const today=toStr(new Date());
  const listHtml=S.offDays.length
    ? S.offDays.slice().sort().map(d=>`
        <div class="ddi">
          <span>${fmtDate(d)}</span>
          <button class="rmbtn" onclick="removeOffDay('${d}');openDayModal()">✕</button>
        </div>`).join('')
    :'<p style="color:var(--muted);font-size:13px">Sin días inhabilitados.</p>';

  openModal(`<div class="overlay" onclick="closeModal(event)">
    <div class="modal" style="max-width:390px">
      <div class="mhd"><h3>${icon('ban','ico-inline')} Día libre / Feriado</h3><button class="mclose" onclick="closeM()">✕</button></div>
      <div class="mbody">
        <p style="color:var(--muted);font-size:13px;margin-bottom:13px">
          Cancela todas las clases del día seleccionado para todos los ramos.
        </p>
        <div class="fg">
          <label class="fl">Fecha</label>
          <input class="fi" type="date" id="ddval" value="${today}">
        </div>
        <button class="btn btn-p" onclick="doAddDay()" style="margin-bottom:18px">Inhabilitar este día</button>
        <div class="seclbl">Días inhabilitados</div>
        ${listHtml}
      </div>
      <div class="mfoot"><button class="btn btn-s" onclick="closeM()">Cerrar</button></div>
    </div>
  </div>`);
}

function doAddDay(){
  const d=document.getElementById('ddval').value;
  if(!d){ alert('Selecciona una fecha'); return; }
  addOffDay(d); openDayModal();
}

// ── Settings ──
function openSettings(){
  const subsHtml=S.subjects.length
    ? S.subjects.map(s=>`
        <div class="sli">
          <div class="sli-info">
            <span class="dot" style="background:${s.color}"></span>
            <span>${esc(s.name)}</span>
            <span class="badge">${esc(s.type)}</span>
            <span style="color:var(--muted);font-size:11px">${s.minAtt}%</span>
          </div>
          <div style="display:flex;gap:3px">
            <button class="ibtn" onclick="closeM();openSubjModal('${s.id}')" title="Editar ramo">${icon('pencil')}</button>
            <button class="ibtn" onclick="closeM();confirmDel('${s.id}')" title="Eliminar ramo">${icon('trash-2')}</button>
          </div>
        </div>`).join('')
    :'<p style="color:var(--muted);font-size:13px">Sin ramos.</p>';

  openModal(`<div class="overlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="mhd"><h3>${icon('settings','ico-inline')} Configuración</h3><button class="mclose" onclick="closeM()">✕</button></div>
      <div class="mbody">
        <div class="sec">
          <div class="seclbl">Semestre</div>
          <div class="frow">
            <div class="fg">
              <label class="fl">Fecha de inicio</label>
              <input class="fi" type="date" id="cs" value="${S.semStart}">
            </div>
            <div class="fg">
              <label class="fl">Fecha de término</label>
              <input class="fi" type="date" id="ce" value="${S.semEnd||''}">
              <div class="fhint">Opcional — activa proyección de faltas</div>
            </div>
          </div>
          <button class="btn btn-p" onclick="saveSem()">Guardar fechas</button>
        </div>
        <div class="sec">
          <div class="seclbl">Apariencia</div>
          <div class="fg">
            <label class="fl">Tema</label>
            <select class="fsel" id="ct">
              <option value="dark"${S.theme!=='light'?' selected':''}>Oscuro</option>
              <option value="light"${S.theme==='light'?' selected':''}>Claro</option>
            </select>
          </div>
          <button class="btn btn-s" onclick="saveTheme()">${icon('sun','btn-ico')}<span class="btn-label">Aplicar tema</span></button>
        </div>
        <div class="sec">
          <div class="seclbl">Ramos (${S.subjects.length})</div>
          ${subsHtml}
          <button class="btn btn-s" style="margin-top:7px" onclick="closeM();openSubjModal(null)">+ Agregar ramo</button>
        </div>
        <div class="sec">
          <div class="seclbl">Datos</div>
          <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px">
            <button class="btn btn-s" onclick="exportData()">${icon('download','btn-ico')}<span class="btn-label">Exportar JSON</span></button>
            <button class="btn btn-s" onclick="triggerImport()">${icon('upload','btn-ico')}<span class="btn-label">Importar JSON</span></button>
          </div>
          <button class="btn btn-d" onclick="confirmReset()">${icon('triangle-alert','btn-ico')}<span class="btn-label">Borrar todos los datos</span></button>
        </div>
      </div>
    </div>
  </div>`);
}

function saveTheme(){
  const theme = document.getElementById('ct')?.value === 'light' ? 'light' : 'dark';
  applyTheme(theme);
  saveState();
  toast(`Tema ${theme==='light'?'claro':'oscuro'} activado`, 'ok');
}

function saveSem(){
  const s=document.getElementById('cs').value;
  const e=document.getElementById('ce').value;
  if(!s){ alert('La fecha de inicio es requerida'); return; }
  if(e&&e<s){
    alert('La fecha de término no puede ser anterior a la de inicio');
    return;
  }

  const startDate=parseD(s);
  const todayDate=parseD(toStr(new Date()));
  const startGap=daysBetween(startDate,todayDate);
  const spanDays=e?daysBetween(parseD(e),startDate):0;

  const suspiciousStart=startGap>YEAR_GUARD_DAYS;
  const suspiciousSpan=!!e&&spanDays>YEAR_GUARD_DAYS;
  if(suspiciousStart||suspiciousSpan){
    const reasons=[];
    if(suspiciousStart) reasons.push(`inicio a ${startGap} días de hoy`);
    if(suspiciousSpan) reasons.push(`duración de ${spanDays} días`);
    const msg=`La fecha del semestre parece fuera de rango (${reasons.join(', ')}).\nEsto puede generar cientos de clases innecesarias en el historial.\n¿Guardar de todos modos?`;
    if(!confirm(msg)) return;
  }

  S.semStart=s; S.semEnd=e||''; closeM(); saveState();
  toast('Fechas del semestre guardadas', 'ok');
}

function confirmReset(){
  if(confirm('¿Borrar TODOS los datos? Esta acción no se puede deshacer.')){
    localStorage.removeItem(KEY);
    localStorage.removeItem(KEY_OLD);
    S=loadState(); applyTheme(S.theme); closeM(); curView='cal'; weekOffset=0; detailId=null; render();
    toast('Todos los datos fueron borrados', 'warn');
  }
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
applyTheme(S.theme);
render();
window.addEventListener('load', refreshIcons);

if ('serviceWorker' in navigator && window.isSecureContext) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch((err) => {
      console.warn('No se pudo registrar el Service Worker:', err);
    });
  });
}
</script>
